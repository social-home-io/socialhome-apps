<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'none';" />
  <title>Chess — Social Home</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <header class="app-header">
    <img src="./icon.svg" alt="" class="app-icon" width="28" height="28" aria-hidden="true" />
    <h1>Chess</h1>
  </header>

  <!-- Single root; all views are rendered here by main.ts -->
  <main id="app-root" aria-label="Chess app"></main>

  <!--
    Classic (non-module) script: the app runs in a sandboxed, opaque-origin
    iframe (origin "null"). `<script type="module">` is fetched with CORS and
    would be blocked (no Access-Control-Allow-Origin) AND uncredentialed (the
    bundle-auth cookie wouldn't be sent). A classic script of an IIFE bundle
    loads cross-origin without CORS and carries the cookie. Social Home apps
    MUST ship a classic/IIFE bundle, not an ES module — see the SDK README.
  -->
  <script src="./app.js"></script>
</body>
</html>
